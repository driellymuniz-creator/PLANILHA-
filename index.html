<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planilha de Controle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>📊 Planilha de Controle de Dados</h1>
    <p>Modelo simples de planilha em HTML e CSS</p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Valor</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Projeto A</td>
          <td>Pesquisa</td>
          <td>R$ 120</td>
          <td class="ativo">Concluído</td>
        </tr>

        <tr>
          <td>2</td>
          <td>Projeto B</td>
          <td>Desenvolvimento</td>
          <td>R$ 300</td>
          <td class="pendente">Em andamento</td>
        </tr>

        <tr>
          <td>3</td>
          <td>Projeto C</td>
          <td>Análise</td>
          <td>R$ 80</td>
          <td class="ativo">Concluído</td>
        </tr>
      </tbody>
    </table>

  </div>

</body>
</html>
